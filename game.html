<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speel en Win!</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-center p-5">

  <h1>Speel en win extra korting!</h1>
  <p>Klik zo vaak mogelijk op de knop in 10 seconden. Haal je 10 of meer? Dan win je 15% korting!</p>

  <button id="gameButton" class="btn btn-primary btn-lg">Klik mij!</button>

  <h2 id="score" class="mt-3">Score: 0</h2>
  <h3 id="timer">Tijd: 10s</h3>
  <h2 id="result" class="text-success mt-4"></h2>

  <script src="js/wheel.js"></script>
</body>
</html>
